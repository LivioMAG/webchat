<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projektübersicht</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./project-detail.css" />
    <script defer src="./project-detail.js"></script>
  </head>
  <body>
    <div class="detail-shell">
      <aside class="detail-sidebar" aria-label="Projektnavigation">
        <div class="nav-icon-list">
          <button class="nav-icon-button active" type="button" title="Dashboard" aria-label="Dashboard">
            <span class="icon" aria-hidden="true">🏠</span>
            <span class="nav-label">Dashboard</span>
          </button>
          <button class="nav-icon-button" type="button" title="Gantt" aria-label="Gantt-Diagramm">
            <span class="icon" aria-hidden="true">📊</span>
            <span class="nav-label">Gantt</span>
          </button>
          <button class="nav-icon-button" type="button" title="Testablauf" aria-label="Testablauf">
            <span class="icon" aria-hidden="true">🧪</span>
            <span class="nav-label">Tests</span>
          </button>
          <button class="nav-icon-button" type="button" title="Dokumente" aria-label="Dokumente">
            <span class="icon" aria-hidden="true">📁</span>
            <span class="nav-label">Docs</span>
          </button>
          <button class="nav-icon-button" type="button" title="Journal" aria-label="Journal">
            <span class="icon" aria-hidden="true">📝</span>
            <span class="nav-label">Journal</span>
          </button>
        </div>

        <div class="nav-icon-footer">
          <button class="nav-icon-button" type="button" title="Team" aria-label="Team">
            <span class="icon" aria-hidden="true">👥</span>
            <span class="nav-label">Team</span>
          </button>
          <button class="nav-icon-button" type="button" title="Einstellungen" aria-label="Einstellungen">
            <span class="icon" aria-hidden="true">⚙️</span>
            <span class="nav-label">Setup</span>
          </button>
        </div>
      </aside>

      <main class="detail-content">
        <section class="dashboard-area" aria-label="Dashboard">
          <header class="dashboard-info">
            <span class="eyebrow">Dashboard</span>
            <p id="projectMeta" class="project-meta">–</p>
          </header>
          <div class="dashboard-canvas" aria-label="Dashboard-Fläche"></div>
        </section>

        <button id="backButton" class="back-button" type="button">Zurück</button>
      </main>
    </div>
  </body>
</html>
