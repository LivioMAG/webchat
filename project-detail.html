<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projektübersicht</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./project-detail.css" />
    <script defer src="./project-detail.js"></script>
  </head>
  <body>
    <div class="detail-shell">
      <aside class="detail-sidebar">
        <div class="nav-placeholder-title">Navigation</div>
        <div class="nav-placeholder-list">
          <span class="nav-placeholder-item"></span>
          <span class="nav-placeholder-item"></span>
          <span class="nav-placeholder-item"></span>
        </div>
      </aside>

      <main class="detail-content">
        <header class="detail-header">
          <div>
            <span class="eyebrow">Übersicht</span>
            <h1>Projekt</h1>
            <p id="projectMeta" class="project-meta">–</p>
          </div>
          <button id="backButton" class="back-button" type="button">Zurück</button>
        </header>

        <section class="detail-panel">
          <h2>Neue Unterseite</h2>
          <p>
            Diese Projekt-Unterseite ist bewusst separat angelegt und kann später mit weiteren
            Inhalten erweitert werden.
          </p>
        </section>
      </main>
    </div>
  </body>
</html>
