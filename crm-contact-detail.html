<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRM Kontakt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./crm-contact-detail.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="./crm-contact-detail.js"></script>
  </head>
  <body>
    <main class="detail-shell">
      <header class="panel detail-header">
        <div>
          <span class="eyebrow">CRM</span>
          <h1 id="contactTitle">Kontakt</h1>
          <p id="contactMeta" class="subtle-text">–</p>
        </div>
        <button id="backButton" class="button" type="button">Zurück</button>
      </header>

      <section class="panel">
        <h2>Kontaktinformationen</h2>
        <dl id="contactInfo" class="info-grid"></dl>
      </section>

      <div id="alert" class="alert hidden"></div>
    </main>
  </body>
</html>
